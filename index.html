<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Duel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
    <div id="game-container">
        
        <!-- Tela de Seleção estilo Arcade Clássico -->
        <div id="char-select">
            <div class="vs-header">SHADOW DUEL<br><span>CHARACTER SELECT</span></div>
            
            <div class="selection-arena">
                
                <!-- Botões de Modo em cima da Arena (BEM VISÍVEIS) -->
                <div class="mode-select-container" style="position: absolute; top: 120px; width: 100%; text-align: center; left: 0; z-index: 100;">
                    <div style="font-family: 'Press Start 2P', cursive; color: #fff; font-size: 12px; margin-bottom: 15px; opacity: 0.8;">SELECIONE O MODO:</div>
                    <button class="mode-btn active" id="btn-arcade" onclick="setMode('arcade')">FIGHT (ARCADE)</button>
                    <button class="mode-btn" id="btn-tutorial" onclick="setMode('tutorial')">TUTORIAL</button>
                </div>

                <!-- Player 1 Portrait -->
                <div class="portrait-side p1-side">
                    <h2 id="p1-preview-name">ESCOLHA...</h2>
                    <div class="big-portrait" id="p1-big-portrait">
                        <div class="portrait-silhouette" id="p1-silhouette"></div>
                    </div>
                </div>

                <!-- Grid de Personagens -->
                <div class="roster-grid">
                    <div class="roster-cell" onmouseover="previewCharacter('hanzo', 'Hanzo', '#555555')" onclick="selectCharacter('hanzo')">
                        <div class="cell-inner" style="background: linear-gradient(0deg, #555555 0%, #111 60%);"></div>
                    </div>
                    <div class="roster-cell" onmouseover="previewCharacter('ignis', 'Ignis', '#ff3300')" onclick="selectCharacter('ignis')">
                        <div class="cell-inner" style="background: linear-gradient(0deg, #ff3300 0%, #111 60%);"></div>
                    </div>
                    <div class="roster-cell" onmouseover="previewCharacter('glacius', 'Glacius', '#00d9ff')" onclick="selectCharacter('glacius')">
                        <div class="cell-inner" style="background: linear-gradient(0deg, #00d9ff 0%, #111 60%);"></div>
                    </div>
                    <div class="roster-cell" onmouseover="previewCharacter('aurum', 'Aurum', '#ffea00')" onclick="selectCharacter('aurum')">
                        <div class="cell-inner" style="background: linear-gradient(0deg, #ffea00 0%, #111 60%);"></div>
                    </div>
                    
                    <!-- Slots Falsos (Para parecer um jogo grande) -->
                    <div class="roster-cell locked"><div class="cell-inner"></div></div>
                    <div class="roster-cell locked"><div class="cell-inner"></div></div>
                    <div class="roster-cell locked"><div class="cell-inner"></div></div>
                    <div class="roster-cell locked"><div class="cell-inner"></div></div>
                    
                    <div class="roster-cell locked"><div class="cell-inner"></div></div>
                    <div class="roster-cell locked"><div class="cell-inner"></div></div>
                    <div class="roster-cell locked"><div class="cell-inner"></div></div>
                    <div class="roster-cell locked"><div class="cell-inner"></div></div>
                </div>

                <!-- Player 2 Portrait -->
                <div class="portrait-side p2-side">
                    <h2 id="p2-preview-name">CPU</h2>
                    <div class="big-portrait" id="p2-big-portrait">
                        <div class="portrait-silhouette" style="background: #333; box-shadow: none;">?</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Overlay HUD - Oculto até começar -->
        <div id="ui-layer" style="display: none;">
            <div id="level-display">Level <span id="level-number">1</span></div>
            <div id="status-bars">
                <div class="player-status player-1">
                    <div class="health-bar-container">
                        <div class="health-bar" id="p1-health"></div>
                        <div class="health-bar-bg"></div>
                    </div>
                    <div class="mana-bar-container">
                        <div class="mana-bar" id="p1-mana"></div>
                    </div>
                    <div class="player-name" id="p1-name">Jogador</div>
                </div>

                <div id="timer">60</div>

                <div class="player-status player-2">
                    <div class="health-bar-container">
                        <div class="health-bar" id="p2-health"></div>
                        <div class="health-bar-bg"></div>
                    </div>
                    <div class="mana-bar-container">
                        <div class="mana-bar" id="p2-mana"></div>
                    </div>
                    <div class="player-name" id="p2-name">Aguardando CPU</div>
                </div>
            </div>
            
            <div id="message-display" style="display: none;">Fight!</div>
            
            <!-- Tutorial Helper Overlay -->
            <div id="tutorial-overlay" style="display: none; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(0,255,255,0.2); border: 2px solid #00d9ff; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 0 20px rgba(0,255,255,0.4); z-index: 10;">
                <h3 style="font-family: 'Press Start 2P'; color: #00d9ff; margin-bottom: 10px; font-size: 16px;">TUTORIAL</h3>
                <p id="tutorial-text" style="font-family: 'Roboto'; font-size: 20px; font-weight: bold; color: white;">Aguarde...</p>
            </div>

            <div id="controls-hint">P1: W/A/S/D Mover | Space Pular | J: Soco, K: Chute, L: Especial</div>
        </div>

        <canvas id="game-canvas" width="1024" height="576"></canvas>
    </div>

    <!-- Scripts -->
    <script src="sprites.js?v=9"></script>
    <script src="game.js?v=9"></script>
</body>
</html>
